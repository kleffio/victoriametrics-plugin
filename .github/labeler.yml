feature:
  - changed-files:
      - any-glob-to-any-file: ["**/*.go", "internal/**", "cmd/**", "frontend/src/**"]
  - head-branch: ["^feature/", "^feat/"]

enhancement:
  - head-branch: ["^enhancement/", "^enh/"]

bugfix:
  - head-branch: ["^bugfix/", "^fix/"]

chore:
  - changed-files:
      - any-glob-to-any-file: [".github/**", "**/Dockerfile", "**/docker-compose*.yml", "frontend/package.json"]
  - head-branch: ["^chore/", "^deps/"]

docs:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md"]

refactor:
  - head-branch: ["^refactor/"]

security:
  - changed-files:
      - any-glob-to-any-file: ["internal/**/crypto/**", "**/*auth*/*", "**/security/**"]
  - head-branch: ["^security/"]

tests:
  - changed-files:
      - any-glob-to-any-file: ["**/*_test.go", "test/**"]
  - head-branch: ["^test/", "^tests/"]
